name: Official Sync Pulse

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Update VERIFICATION.md with timestamp
        run: |
          echo "Proxy Database Verification: $(date -u)" >> VERIFICATION.md
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERIFICATION.md
          git commit -m "chore: Proxy Database Verification [skip ci]" || echo "No changes to commit"
          git push
